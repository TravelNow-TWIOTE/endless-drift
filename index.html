<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Endless Drift</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Endless Drift</h1>

<button id="instructionsBtn">Instructions</button>

<div id="instructionsBox">
<h2>How to Play</h2>
<p>Hold SPACE → turn right</p>
<p>Release SPACE → turn left</p>
<p>Stay on the platforms</p>
<p>Press R to restart</p>
<button id="closeInstructions">Close</button>
</div>

<canvas id="gameCanvas"></canvas>

<script src="game.js"></script>

<script>
const btn = document.getElementById("instructionsBtn");
const box = document.getElementById("instructionsBox");
const close = document.getElementById("closeInstructions");

btn.onclick = () => box.style.display = "block";
close.onclick = () => box.style.display = "none";
</script>

</body>
</html>
