<!DOCTYPE html>
<html>

<head>
<title>Endless Drift</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Endless Drift</h1>

<button id="instructionsBtn">Instructions</button>

<div id="instructionsBox">
<h2>How to Play</h2>
<p>Hold SPACE to drift right.</p>
<p>Release SPACE to drift left.</p>
<p>Stay on the road as long as possible.</p>
<p>Your score increases over time.</p>
<button id="closeInstructions">Close</button>
</div>

<canvas id="gameCanvas"></canvas>

<script src="game.js"></script>

<script>
const btn = document.getElementById("instructionsBtn");
const box = document.getElementById("instructionsBox");
const close = document.getElementById("closeInstructions");

btn.onclick = () => {
box.style.display = "block";
};

close.onclick = () => {
box.style.display = "none";
};
</script>

</body>
</html>
